<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thi Công Nhà Lá</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#1b5e20;
display:flex;
justify-content:center;
}

nav a{
color:white;
padding:15px 20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#388e3c;
}

.banner{
width:100%;
height:350px;
object-fit:cover;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

.contact{
position:fixed;
bottom:20px;
right:20px;
}

.contact a{
display:block;
margin:10px;
padding:12px;
background:#2e7d32;
color:white;
text-decoration:none;
border-radius:50px;
text-align:center;
}
</style>
